name: Yield curve pipeline

on:
  schedule:
    # 22:00 UTC, after Treasury's ~19:00 ET EOD publish
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: Ingestion mode. Use "backfill" once to load history, "incremental" for the normal daily refresh.
        type: choice
        options: [incremental, backfill]
        default: incremental
      start_year:
        description: First year to fetch when mode=backfill.
        type: string
        default: '1990'

concurrency:
  group: yield-curve-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    env:
      BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
      BQ_DATASET: ${{ vars.BQ_DATASET || 'yield_curve' }}
      DBT_PROFILES_DIR: ${{ github.workspace }}/pipeline/dbt
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/pipeline/gcp-key.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json

      - name: Ingest Treasury observations
        run: >
          python ingest/treasury_ingest.py
          --mode ${{ github.event.inputs.mode || 'incremental' }}
          --start-year ${{ github.event.inputs.start_year || '1990' }}

      - name: dbt build
        working-directory: pipeline/dbt
        run: dbt build

      - name: Export marts to JSON
        run: python export/export_marts.py

      - name: Remove GCP key
        if: always()
        run: rm -f gcp-key.json

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ../public/data/mart_current_curve.json ../public/data/mart_yield_history.json ../public/data/mart_spread_10y_2y.json
          git diff --cached --quiet && echo "No data changes" || git commit -m "Refresh yield curve data"
          git push
