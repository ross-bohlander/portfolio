<mat-form-field appearance="outline" class="player-picker">
  <mat-label>Player</mat-label>
  <mat-select [value]="selectedPlayer() || players()[0]" (selectionChange)="selectedPlayer.set($event.value)">
    @for (player of players(); track player) {
      <mat-option [value]="player">{{ player }}</mat-option>
    }
  </mat-select>
</mat-form-field>

<div echarts class="chart-wrapper" [options]="initOptions" [merge]="chartOption()"></div>
