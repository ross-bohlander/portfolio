<mat-toolbar class="site-header">
  <div class="page-wrap toolbar-inner">
    <a class="brand" routerLink="/">
      <mat-icon>data_object</mat-icon>
      <span>Ross</span>
    </a>

    <nav mat-tab-nav-bar [tabPanel]="panel">
      <a mat-tab-link routerLink="/" routerLinkActive #home="routerLinkActive" [routerLinkActiveOptions]="{ exact: true }" [active]="home.isActive">
        Home
      </a>
      <a mat-tab-link routerLink="/about" routerLinkActive #about="routerLinkActive" [active]="about.isActive">
        About
      </a>
      <a mat-tab-link routerLink="/projects" routerLinkActive #projects="routerLinkActive" [active]="projects.isActive">
        Projects
      </a>
      <a mat-tab-link routerLink="/contact" routerLinkActive #contact="routerLinkActive" [active]="contact.isActive">
        Contact
      </a>
    </nav>
    <mat-tab-nav-panel #panel></mat-tab-nav-panel>

    <a mat-stroked-button class="resume-link" href="/Ross_Bohlander_Resume.pdf" download target="_blank">
      <mat-icon>download</mat-icon>
      Resume
    </a>
  </div>
</mat-toolbar>
