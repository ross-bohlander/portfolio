<div class="page-wrap projects-page">
  <p class="eyebrow">Projects</p>
  <h1>Case studies</h1>

  <div class="tabs" role="tablist">
    @for (project of projects; track project.slug) {
      <button
        type="button"
        role="tab"
        class="tab"
        [class.active]="project.slug === activeSlug()"
        [attr.aria-selected]="project.slug === activeSlug()"
        (click)="selectProject(project.slug)"
      >
        {{ project.name }}
      </button>
    }
  </div>

  @if (activeProject(); as project) {
    <mat-card appearance="outlined" class="project-detail">
      <mat-card-content>
        <p class="summary">{{ project.summary }}</p>

        <mat-chip-set class="tags">
          @for (tag of project.tags; track tag) {
            <mat-chip>{{ tag }}</mat-chip>
          }
        </mat-chip-set>

        <div class="links">
          @if (project.repoUrl) {
            <a mat-stroked-button [href]="project.repoUrl" target="_blank" rel="noopener">Repo</a>
          }
          @if (project.liveUrl) {
            <a mat-stroked-button [href]="project.liveUrl" target="_blank" rel="noopener">Live</a>
          }
        </div>

        @if (project.slug === 'squad-planner') {
          <app-squad-dashboard />
        }
      </mat-card-content>
    </mat-card>
  }
</div>
