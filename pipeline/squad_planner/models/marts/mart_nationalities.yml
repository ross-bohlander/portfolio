version: 2

models:
  - name: mart_nationalities
    description: Returns a table showing the nationality distribution of all players.
    columns:
      - name: nationality
        description: nationality in abbreviated format (German -> GER)
        tests:
          - not_null
      - name: count
        description: count of nationalities
      - name: pct_of_squad
        description: percentage of entire squad with this nationality
